name: Refresh dashboard data

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed to commit web/data.json back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: refresh/requirements.txt

      - name: Install deps
        run: pip install -r refresh/requirements.txt

      - name: Write SA key + config
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          ANALYTICS2_CONFIG: ${{ secrets.ANALYTICS2_CONFIG }}
        run: |
          printf '%s' "$GCP_SA_KEY" > /tmp/sa.json
          printf '%s' "$ANALYTICS2_CONFIG" > config.yaml

      - name: Refresh
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: python -m refresh.main

      - name: Commit data.json
        run: |
          git config user.name 'analytics2-bot'
          git config user.email 'analytics2-bot@users.noreply.github.com'
          git add web/data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh dashboard data"
            git push
          fi
